рной. Однако можно ее представить набором таблиц выходной и переходной характеристик. Если автомат детерминирован, то таблицы однозначно определяют работу автомата (пример – машина Тьюринга, конечный детерминированный автомат с конечной памятью, память – число внутренних состояний). Однако существуют и вероятностные автоматы, переход которых из состояния в состояние определяется с какой-то вероятностью. В этом случае у таблиц автоматов появляется еще одна размерность – вероятность. \n\nИногда поведение автоматов представляют с помощью графа. Вершинами графа являются его состояния (описываемые Zk), ребрами – возможные входные сигналы. Под действием этих сигна..."},{"num":31,"title":"Понятие жадного алгоритма. Алгоритмы оптимизации на сетях и графах. Алгоритмы Прима и Краскала.","content":"Алгоритмы оптимизации на сетях и графа\n\nГраф можно представить как совокупность двух множеств – множества вершин и множества ребер, связанных с вершинами (инцидентных вершинам). Таким образом, граф можно было бы описать в ЭВМ двумя связанными массивами, однако существуют более удобные варианты:\n\n- Матрица смежности. Квадратная матрица, в которой каждая строка и столбец соответствуют одной вершине графа. Если вершины связаны ребром, то на пересечении соответствующих строк и столбцов записывается число. Если связи нет, то записывается ноль. Есть вариант, когда записывают только число 1 (нет длин ребер) или число равное длине ребра. Матрица смежности симметрична относительно главной диагонали, на главной диагонали все значения равны нулю, количество ненулевых элементов строки или столбца равно степени соответствующей вершины.\n\n- Матрица инциндентности. Матрица в которой строки связаны с вершинами графа, а столбцы с ребрами графа. В общем случае не квадратная. Как правило содержит нули и единицы. Ноль при отсутствии соединения вершины и ребра, 1 при наличии инциндентности. Главное свойство этой матрицы – число ненулевых элементов любого столбца равна 2. Количество ненулевых элементов строки равно степени соответствующей вершины.\n\n- Список ребер. Пронумерованный список пар вершин, которые связаны с ребром данного номера.\n\nНаличие нескольких вариантов описания графа требует прежде всего построения алгоритмов проверки правильности введенных данных и возможности конвертации данных из одного варианта в другой. \n\nСледующей задачей является визуализация графа. Так как любой граф можно изобразить на плоскости, то подобная задача имеет простой смысл: изображаем в случайных, несовпадающих точках вершины-круги и соединяем их отрезками, соответствующими ребрам графа.\n\nАлгоритмы решения задач на графах\n\nСреди множества задач, связанных с графами выделим 3 важнейших задачи оптимизации:\n\n- Задача Прима-Краскала\n\n- Задача Дейкстры\n\n- Задача Форда-Фалкерсона\n\nО. Задача оптимизации ‒ поиск максимума или минимума некой целевой функции.  Задача оптимизации на графе означает, что целевая функция задается на графе. Это может быть взвешенный граф, или функция определяется в вершинах, или просто функция зависит от числа ребер (вершин) на некотором пути. Иногда функция формируется путем подсчетов числа маршрутов, циклов, путей, неких структур (например треугольников одного цвета) в графе. Такими являются многие комбинаторные задачи. Наличие графа здесь фактически усложняет поиск, так ..."},{"num":32,"title":"Алгоритмы оптимизации на сетях и графах. Алгоритмы Дейкстры и Флойда.","content":"Алгоритмы Дейкстры и Флойда\n\nЗадача Дейкстры связана с поиском кратчайших путей между вершинами графа при наличии длин ребер.\n\nАлгоритм использует три массива из n чисел каждый. Первый массив А содержит метки с двумя значениями: 0 и 1, второй массив В содержит расстояния  -  текущие кратчайшие расстояния между соответствующими вершинами, третий массив содержит обозначения вершин. Матрица расстояний diк задает длины дуг diк, если такой дуги нет, то diк присваивается большое число, равное «сумме всех расстояний ребер графа». Начиная с заданной вершины К алгоритм заполняет массив В. На первом шаге вносятся в В расстояния от К до всех вершин. Вершина К в массиве А помечается. Среди непомеченных вершин ищут вершину, которая имеет минимальное число в В. Далее эту вершину помечают и изменяют значения в массиве В для непомеченных вершин по правилу:\n\nЕсли сумма расстояния для последней помеченной вершины и расстояние от нее до данной вершины меньше записанного раннее значения, то записывают в массив В эту сумму. Теперь эта сумма считается новым расстоянием для проверяемой вершины.\n\nАлгоритм выполняют до того момента, когда не остается не помеченных вершин.\n\nАлгоритм Уоршелла-Флойда – усовершенствование метода Дейкстры для решения задачи поиска всех расстояний между всеми вершинами. Его можно представить в виде программы Паскаля:\n\nFor k:=1 to N do\n\nFor i:=1 to N do\n\nFor j:=1 to N do\n\nd[i,j]:= min(d[i,j], d[i,k]+d[k,j]);\n\nЗдесь d[i,j] – массив расстояний, min – функция вычисляющая минимальное из 2 значений. Примеры решения задач\n\nЗадача Прима-Краскала \n\nСтроим граф. Найти кратчайший путь и построить остовное дерево минимальной длины, используя алгоритм Прима и Краскала.\n\nПерепишем ребра в порядке возрастания. Строим граф согласно алгоритму.\n\n| 23 1+ 56 1+ 17 2+ 27 2+ 78 2+ 45 2+ 12 3- 35 3+ 68 3 24 4 18 4 34 4 48 6 46 7 47 7 |  |\n| --- | --- |\n\nДля алгоритма Краскала процесс обратный, но дерево получается то же.\n\nРешение задачи Дейкстра Найти расстояния от А до всех остальных точек.\n\nУсловие: Вершины:A, B, C, D, E, K, M\n\nAB=7   AD=12  AM=5   BE=11  BK=9  BM=7  CM=6  CD=10  EM=5  EK=12  DM=5  KM=6 AK=6. Изобразим граф задачи:\n\nСоставляем таблицу: По горизонтали, в первой строке(шапка) указываем вершины от А до М, по вертикали указываются пути, от точки А до всех остальных.\n\n|  | А | B | C | D | E | K | M |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n| A | 0 | 7 | ∞ | 12 | ∞ | 6 | 5 |\n| 5+M | - | 7 | 11 | 10 | 10 | 6 | 5 |\n| 6+K | - | 7 | 11 | 10 | 10 | 6 | - |\n|..."},{"num":33,"title":"Алгоритмы оптимизации на сетях и графах. Задача Форда-Фалкерсона о потоках в сетях.","content":"Алгоритмы решения задачи о максимальном потоке.\n\nЗадача Форда-Фалкерсона о потоках в сетях\n\nСетью называется связный граф с выделенной парой вершин – входом и выходом. Если есть несколько входов или выходов, то создают виртуальный вход или выход, соединенный со всеми входами или выходами. Транспортной сетью называется сеть (чаще всего с дугами, как ориентированный граф) с заданной на дугах специальной функцией – пропускной способностью (которая должна быть положительной). \n\nВершина начала транспортной сети, из которой дуги только выходят. Вершина выхода транспортной сети, в которую дуги только входят. На множестве дуг b задана целочисленная функция с(b) > 0, где с(b) – пропускная способность дуги b.\n\nОпределение. Потоком по транспортной сети называется положительно определенная функция φ(b)≥0 , заданная на множестве дуг b и обладающая следующими свойствами:\n\nА) Для любой дуги с(b) ≥ φ(b).  Б) Сумма входных потоков в любой вершина сети равна сумме выходных потоков.\n\nСвойство Б утверждает, что поток, входящий в вершину, равен выходящему потоку (поток в вершинах не скапливается). Это свойство называют правилом (законом) Кирхгофа.\n\nДуга называется насыщенной если для нее с= φ.\n\nНабор дуг, удаление которых ведет к разрыву связи между входом и выходом (связь есть, если есть путь между вершинами) называют сечением сети.\n\nПростым сечением называют сечение в котором нельзя удалить ни одну дугу без потери свойства сечения (нет лишних дуг).\n\nНасыщенным сечением является сечение в котором все дуги насыщены.\n\nПропускной способностью сечения называют сумму пропускных способностей ее дуг.\n\nЗадача Форда- Фалкерсона (ФФ) – поиск максимально возможного потока в транспортной сети.\n\nТеорема Форда- Фалкерсона – максимальный поток в сети равен минимальной пропускной способности сечений этой сети.\n\nМетоды решения задачи Форда-Фалкерсона\n\nДля решения задачи нужно найти набор дуг (сечение), которое обладает следующими свойствами:\n\n- Все дуги набора(сечения) насыщены.\n\n- Удаление дуг набора(сечения) приводит к разрыву связей между входом и выходом.\n\n- Для разрыва связи нужны все дуги набора(сечения). Если удалить любую дугу, то сечение не будет удовлетворять 2-му свойству.\n\nПоиск решения имеет множество различных алгоритмов. Рассмотрим 2 из них:\n\nА) Метод обратного планирования Беллмана. Суть метода определяется алгоритмом:\n\n- Выбираем выходную вершину как слой номер Т.\n\n- Рассматриваем все дуги, входящие в слой Т. Насыщаем их.\n\n- Рассматриваем все вершины, откуда начинаются дуги, ..."},{"num":34,"title":"Понятие о кибернетике. Система управления и ее реализация. Обратная связь в системе управления. Системы прогноза.","content":"Кибернетика как наука об управлении и управляющих системах\n\nКибернетика ‒ наука о процессе управления, построении управляющих систем и автоматизации управления каким-то объектом управления (ОУ).\n\nУправлящая система = ОУ+Система Управления (СУ). СУ бывают автоматизированными (жесткая) и гибкими.\n\nОсновой теории кибернетики является понятие - гомеостат. Гомеостат ‒ система, которая поддерживает некое устойчивое состояние равновесия. Пример гомоестата ‒ термостат, который поддерживает постоянную температуру. Другой пример гомеостата ‒ автопилот. Для автопилота равносие заключается в отсутствии отклонений от некой функции ‒ полетного курса. Это все примеры автоматизированных или жестких систем управления, использующих простую обратную связь.\n\nКибернетика установила, что управление присуще только системным объектам. Общим в процессах является его антиэнтропийный характер, направленность на упорядочение системы.\n\nО. Теоория управлеония ‒ наука о принципах и методах управления различными системами, процессами и объектами. Основами теории управления являются кибернетика и теория информации. Суть теории управления: на основе системного анализа составляется математическая модель объекта управления (ОУ), после чего синтезируется алгоритм управления (АУ) для получения желаемых характеристик протекания процесса или целей управления. Данная область знаний хорошо развита и находит широкое применение в современной технике. В социально-экономических системах теория управления посвящена приемам и методам анализа, прогноза и возможностям регулирования деятельности различных общностей людей (мирового сообщества, региональных объединений, наций, общественно-хозяйственных групп).Теория управления, как любая наука, имеет свою методологию и методическое обеспечение. Однако в области естествознания и техники теория управления имеет гораздо больше успехов, чем в социально-экономической сфере, где, очевидно, действует ограничение, вытекающее из принципа ‒ «система не может объяснить саму себя».\n\nПервое самоуправляемое устройство было построено Ктезибием из Александрии (примерно в 250 году до н.э.). Его водяные часы использовали сифон как регулятор потока воды. До этого изобретения считалось, что только живые существа способны модифицировать свое поведение в ответ на изменения в окружающей среде. Следующим шагом в развитии саморегулирующихся систем управления с обратной связью стали регулятор паровой машины Джеймса Уатта (1736‒1819), и термостат Корнелиса Дреббеля (1572‒1633). Матема..."},{"num":36,"title":"Понятие жадного алгоритма. Матроиды и их свойства.","content":"Матроиды\n\nВ теории графов играют важную роль жадные алгоритмы. Они просты для понимания и реализации, работают сравнительно быстро, известно много разнообразных задач, которые можно решить с помощью жадных алгоритмов. Однако не всегда можно доказать возможность применимости жадного алгоритма для нахождения точного решения многих задач. \n\nЖадными (градиентными) называют алгоритмы, действующие по принципу\n\n\"максимальный выигрыш на каждом шаге\". Такая стратегия не всегда ведет к конечному успеху иногда выгоднее сделать не наилучший, казалось бы, выбор на очередном шаге с тем, чтобы в итоге получить оптимальное решение. Но для некоторых задач применение жадных алгоритмов оказывается оправданным.\n\nРассмотрим теоретическую основу жадных алгоритмов – теорию матроидов. При помощи нее можно довольно часто установить возможность применимости жадного алгоритма. Для этого необходимо, чтобы исследуемое множество являлось матроидом. Когда возник вопрос о том, каковы обстоятельства, при которых жадный алгоритм результативен, или иначе - что особенного в тех задачах, для которых он дает точное решение, оказалось, что математическая теория, с помощью которой что-то в этом можно прояснить, уже существует. Это теория матроидов, основы которой были заложены Уитни в работе 1935 г. Целью создания теории матроидов было изучение комбинаторного аспекта линейной независимости, а в дальнейшем обнаружились разнообразные применения понятия матроида, первоначально совсем не имевшиеся в виду.\n\nМатроид ‒ классификация подмножеств некоторого множества, представляющая собой обобщение идеи независимости элементов, аналогично независимости элементов линейного пространства, на произвольное множество.\n\nМатроид ‒ пара множеств Х и К, где Х ‒ конечное [множество](https://dic.academic.ru/dic.nsf/ruwiki/4759)[,](https://dic.academic.ru/dic.nsf/ruwiki/4759) называемое носителем матроида (база), а К ‒ некоторое множество [подмножеств](https://dic.academic.ru/dic.nsf/ruwiki/1359)[ ](https://dic.academic.ru/dic.nsf/ruwiki/1359)Х, называемое семейством независимых множеств (2 особых условия). Рангом матроида называется мощность его базового множества. \n\nМатроиды – совокупность 2-х множеств (базовое множество и множество «независимых» подмножеств). Подмножества удовлетворяют условиям – если В принадлежит Т и А подмножество В => А принадлежит Т, А + В принадлежит Т и |A|<|B| => существует такой Х, что он принадлежит В\\А и (А u Х) принадлежит Т, Х – элемент, который добавляют. \n\nМатроидом называется пара ..."}];

let currentQ = null;
let done = new Set(JSON.parse(localStorage.getItem('toi_done')||'[]'));
let chatHistories = {};

// INIT
renderList(QS);
updateProg();

function renderList(list) {
  document.getElementById('qListEl').innerHTML = list.map(q => `
    <div class="q-item ${done.has(q.num)?'done':''}" onclick="openQ(${q.num})">
      <div class="q-num">${q.num}</div>
      <div class="q-info">
        <div class="q-title">${q.title}</div>
      </div>
      <div class="q-arrow">›</div>
    </div>
  `).join('');
}

function filterQ(v) {
  const f = v.toLowerCase();
  renderList(f ? QS.filter(q => q.title.toLowerCase().includes(f) || String(q.num).includes(f)) : QS);
}

function openQ(num) {
  currentQ = num;
  const q = QS.find(x => x.num===num);
  document.getElementById('detailNum').textContent = 'Вопрос ' + num;
  document.getElementById('detailBadge').textContent = '№' + num;
  document.getElementById('detailTitle').textContent = q.title;
  document.getElementById('theoryText').textContent = q.content || '(Материал отсутствует — используй AI)';
  updateMarkBtn();
  switchTab('theory');
  // Reset quiz
  document.getElementById('quizWrap').innerHTML = `<button class="gen-btn" onclick="genQuiz()">🎲 Сгенерировать тест</button><div style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:8px">AI создаст 3 вопроса по этой теме</div>`;
  // Init chat
  initChat(num);
  document.getElementById('screenList').classList.remove('active');
  document.getElementById('screenDetail').classList.add('active');
}

function goBack() {
  document.getElementById('screenDetail').classList.remove('active');
  document.getElementById('screenList').classList.add('active');
  renderList(QS.filter(q => {
    const s = document.getElementById('searchInput').value.toLowerCase();
    return s ? q.title.toLowerCase().includes(s) || String(q.num).includes(s) : true;
  }));
}

function switchTab(tab) {
  ['theory','ai','quiz'].forEach(t => {
    const panel = document.getElementById('panel' + cap(t));
    const btn = document.getElementById('tab' + cap(t));
    const isActive = t === tab;
    btn.classList.toggle('active', isActive);
    if(t === 'ai') {
      panel.style.display = isActive ? 'flex' : 'none';
      if(isActive) panel.style.flexDirection = 'column';
    } else {
      panel.style.display = isActive ? 'block' : 'none';
    }
  });
  if(tab==='ai') setTimeout(()=>{document.getElementById('chatArea').scrollTop=9999;},50);
}

function cap(s) { return s[0].toUpperCase()+s.slice(1); }

function toggleDone() {
  if(done.has(currentQ)) done.delete(currentQ);
  else done.add(currentQ);
  localStorage.setItem('toi_done', JSON.stringify([...done]));
  updateMarkBtn();
  updateProg();
}

function updateMarkBtn() {
  const btn = document.getElementById('markBtn');
  if(done.has(currentQ)) {
    btn.textContent = '✅ Выучено!';
    btn.classList.remove('undone');
  } else {
    btn.textContent = '☐ Отметить как выученное';
    btn.classList.add('undone');
  }
}

function updateProg() {
  const pct = Math.round(done.size/QS.length*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progText').textContent = done.size+' / '+QS.length;
}

// CHAT
const CHIPS = ['Простыми словами','Шпаргалка за 5 пунктов','Что спросит препод?','Примеры','Определения'];

function initChat(num) {
  const area = document.getElementById('chatArea');
  if(chatHistories[num]) {
    area.innerHTML = chatHistories[num];
  } else {
    const q = QS.find(x=>x.num===num);
    area.innerHTML = `<div class="msg"><div class="msg-av ai">AI</div><div class="bubble ai">Привет! Готов помочь с вопросом <strong>${num}</strong>.<br><br>Спроси что хочешь или нажми кнопку выше 👆</div></div>`;
  }
  document.getElementById('quickChips').innerHTML = CHIPS.map(c=>`<div class="chip" onclick="quickSend('${c}')">${c}</div>`).join('');
  document.getElementById('chatInput').value = '';
}

function quickSend(text) {
  document.getElementById('chatInput').value = text;
  sendMsg();
}

function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  const q = QS.find(x=>x.num===currentQ);
  input.value='';
  const btn = document.getElementById('sendBtn');
  btn.disabled=true;
  const area = document.getElementById('chatArea');

  area.innerHTML += `<div class="msg user"><div class="msg-av user">Я</div><div class="bubble user">${esc(text)}</div></div>`;
  const lid = 'l'+Date.now();
  area.innerHTML += `<div class="msg" id="${lid}"><div class="msg-av ai">AI</div><div class="bubble ai"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
  area.scrollTop=area.scrollHeight;

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:800,
        system:`Ты помощник студента. Экзамен по ТОИ (Теоретические основы информатики), 2 курс.
Вопрос №${currentQ}: "${q.title}"
Материал: ${(q.content||'').substring(0,1800)}
Отвечай по-русски, коротко и понятно. Без воды.`,
        messages:[{role:"user",content:text}]
      })
    });
    const d = await r.json();
    const reply = d.content?.[0]?.text||'Ошибка';
    document.getElementById(lid).remove();
    area.innerHTML += `<div class="msg"><div class="msg-av ai">AI</div><div class="bubble ai">${esc(reply)}</div></div>`;
  } catch(e) {
    document.getElementById(lid).remove();
    area.innerHTML += `<div class="msg"><div class="msg-av ai">AI</div><div class="bubble ai">Ошибка: ${e.message}</div></div>`;
  }
  area.scrollTop=area.scrollHeight;
  chatHistories[currentQ]=area.innerHTML;
  btn.disabled=false;
}

// QUIZ
async function genQuiz() {
  const q = QS.find(x=>x.num===currentQ);
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted)"><div class="dots"><span></span><span></span><span></span></div><div style="margin-top:12px;font-size:0.85rem">Генерирую тест...</div></div>`;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:900,
        messages:[{role:"user",content:`Тема: "${q.title}". Материал: ${(q.content||'').substring(0,1400)}
Создай 3 вопроса с 4 вариантами. Верный всегда первый (A).
Только JSON, без markdown:
[{"q":"...","correct":"...","wrong":["...","...","..."]}]`}]
      })
    });
    const d = await r.json();
    let txt = d.content[0].text.replace(/\`\`\`json|\`\`\`/g,'').trim();
    const qs = JSON.parse(txt);
    wrap.innerHTML = qs.map((item,i)=>{
      const opts = shuffle([{t:item.correct,ok:true},...item.wrong.map(w=>({t:w,ok:false}))]);
      return `<div class="quiz-q-card"><div class="quiz-q-text">${i+1}. ${esc(item.q)}</div>${opts.map(o=>`<button class="quiz-opt" onclick="pickOpt(this,${o.ok},'${esc(item.correct).replace(/'/g,"\'")}','g${i}')" data-g="g${i}">${esc(o.t)}</button>`).join('')}</div>`;
    }).join('') + `<button class="gen-btn" onclick="genQuiz()" style="margin-top:4px">🔄 Новый тест</button>`;
  } catch(e) {
    wrap.innerHTML = `<div style="color:var(--red);padding:20px">Ошибка: ${e.message}</div><button class="gen-btn" onclick="genQuiz()">Попробовать снова</button>`;
  }
}

function pickOpt(el, ok, correctText, gid) {
  const btns = document.querySelectorAll(`[data-g="${gid}"]`);
  btns.forEach(b=>{ b.style.pointerEvents='none'; if(b.textContent.trim()===correctText.trim()) b.classList.add('correct'); });
  el.classList.add(ok?'correct':'wrong');
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
